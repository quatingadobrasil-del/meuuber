# Configuração para o deploy do Laravel no Railway.app (v2 - Corrigido)

[phases.setup]
# Define a versão do PHP como 8.1 e instala as extensões necessárias.
# O formato "^7.3|^8.0" não é suportado; uma versão específica deve ser declarada.
nixPkgs = ["php81", "php81Packages.composer", "php81Packages.gd", "php81Packages.pdo_mysql"]

[phases.build]
# Instala as dependências do Composer, otimizando para produção.
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
# Comando para iniciar o servidor PHP com o Artisan, usando a porta fornecida pelo Railway.
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"

[variables]
# Define o diretório raiz da aplicação como a pasta /public do Laravel.
NIXPACKS_WEB_ROOT = "public"


providers = ["php"]

