[phases.setup]
nixPkgs = ["php81", "php81Packages.composer"]

[phases.install]
# Força a instalação das dependências PRIMEIRO
cmds = ["composer install --ignore-platform-reqs --no-interaction --no-dev --optimize-autoloader"]

[phases.build]
# Só roda o cache DEPOIS que o 'install' terminou e a pasta vendor existe
cmds = ["php artisan config:cache", "php artisan route:cache"]



