[phases.setup]
nixPkgs = ["php81", "php81Packages.composer"]

[phases.install]
# Apenas instala as pastas necessárias (a vendor)
cmds = ["composer install --ignore-platform-reqs --no-interaction --no-dev --optimize-autoloader"]

[start]
# Liga o servidor direto, sem tentar fazer cache ou mexer no banco antes da hora
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"

[variables]
NIXPACKS_PHP_ROOT = "public"
